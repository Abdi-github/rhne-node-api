services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rhne-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/rhne?authSource=admin
      - REDIS_HOST=redis
      - MAIL_HOST=mailpit
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rhne-network

  mongodb:
    image: mongo:7
    container_name: rhne-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: rhne
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rhne-network

  redis:
    image: redis:7-alpine
    container_name: rhne-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rhne-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: rhne-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - rhne-network

  mongo-express:
    image: mongo-express:latest
    container_name: rhne-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - rhne-network

volumes:
  mongodb_data:
  redis_data:

networks:
  rhne-network:
    driver: bridge
